## FeishuOPC OAuth callback — stage 1 (HTTP only).
##
## Replace oauth.example.com with your real hostname (must match
## OAUTH_CALLBACK_DOMAIN when running scripts/setup_oauth_callback.sh).
## After deploy, run certbot against that hostname, e.g.:
##     sudo certbot --nginx -d oauth.example.com

server {
    listen 80;
    listen [::]:80;
    server_name oauth.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass         http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
